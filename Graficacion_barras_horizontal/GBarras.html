<!doctype html>
<html class="no-js" lang="es">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gráfico de barras horizontal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJx61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">
    <link rel="stylesheet" href="./style/index.css">
</head>

<body class="barras-page">
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Graficador 3.0</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown"
                aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="GBarras.html">Gráfico de Barras</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <section class="hero-card">
            <div class="row align-items-center g-4">
                <div class="col-lg-6">
                    <span class="badge-soft">Entrada desde pantalla</span>
                    <h1>Gráfico de barras horizontal</h1>
                    <p class="hero-text">
                        Captura los valores separados por coma y genera el gráfico directamente en el canvas.
                    </p>
                </div>

                <div class="col-lg-6">
                    <div class="input-panel">
                        <label class="form-label" for="datos-input">Datos positivos separados por comas</label>
                        <div class="input-group input-group-lg">
                            <input type="text" id="datos-input" class="form-control" value="10, 25, 40, 15, 30">
                            <button id="btn-graficar-barras" class="btn btn-graficar">Graficar</button>
                        </div>
                        <small>Ejemplo: 12, 30, 18, 45, 22</small>
                    </div>
                </div>
            </div>
        </section>

        <section class="canvas-card mt-4">
            <div class="canvas-header">
                <div>
                    <h2>Resultado</h2>
                    <p>Visualización horizontal de los datos ingresados.</p>
                </div>
            </div>

            <div class="canvas-wrapper">
                <canvas id="canvas-barras" width="640" height="480"></canvas>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-b5kHyXgcpbZJO/tY9Ul7kGkf1S0CWuKcCD38l8YkeH8z8QjE0GmW1gYU5S9FOnJ0" crossorigin="anonymous">
        </script>
    <script src="./dist/src/mainBarras.js" type="module"></script>
</body>

</html>
