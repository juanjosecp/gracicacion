<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Polígonos Regulares </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./Estilo/estilo3d.css">
</head>
<body class="bg-dashboard">

    <div class="container-xl my-4 my-md-5 px-3">
        <div class="card shadow-lg border-0 p-3 p-sm-4 main-dashboard-card">
            
            <div class="text-center mb-4">
                <h3 class="fw-bold text-dark d-flex align-items-center justify-content-center gap-2 dashboard-title">
                    <i class="bi bi-hexagon-half text-success"></i> FIGURAS GEOMÉTRICO 
                </h3>
                <hr class="text-muted opacity-25">
            </div>

            <div class="card border border-light-subtle p-3 p-sm-4 bg-panel-inputs rounded-4 mb-4">
                <h5 class="fw-bold text-secondary mb-3 d-flex align-items-center gap-2">
                    <i class="bi bi-sliders text-muted"></i> Parámetros de la Figura
                </h5>
                
                <div class="row g-4">
                    <div class="col-12">
                        <label class="form-label fw-semibold text-dark mb-1">
                            <i class="bi bi-triangle text-success me-1"></i> Número de Lados: <span id="lblLados" class="badge bg-success ms-1">4</span>
                        </label>
                        <input type="range" id="inputLados" class="form-range" min="3" max="20" value="4">
                        <small class="text-muted d-block mt-1">3 = Triángulo, 4 = Cuadrado, 5 = Pentágono...</small>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <button id="btnGraficar" class="btn btn-success px-5 py-2 fw-bold rounded-pill btn-action shadow-sm">
                        <i class="bi bi-arrow-repeat me-1"></i> Redibujar Figura
                    </button>
                </div>
            </div>

            <div class="card border border-light-subtle p-3 p-sm-4 rounded-4 bg-white shadow-inner">
                <h5 class="fw-bold text-dark text-start mb-3">Renderizado Vectorial en Canvas</h5>
                
                <div class="canvas-responsive-wrapper">
                    <canvas id="canvasPoligonos" width="800" height="500"></canvas>
                </div>
            </div>

            <div class="text-center mt-4">
                <span class="text-muted small fw-medium tracking-wide"></span>
            </div>

        </div>
    </div>

    <script src="./DistSRC/index.js" type="module"></script>
</body>
</html>
