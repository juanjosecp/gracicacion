<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graficador Avanzado TS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="./Estilo/index.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
<div class="container-fluid">
<span class="navbar-brand">Graficador Avanzado</span>
</div>
</nav>

<div class="container mt-4">
<div class="card p-3 shadow">
<div class="row g-2">
<div class="col-md-4">
<input id="funcInput" class="form-control" value="Math.sin(x)">
</div>
<div class="col-md-2">
<input type="color" id="colorGrafica" value="#0d6efd" class="form-control form-control-color">
</div>
<div class="col-md-6 d-flex gap-2 flex-wrap">
<button id="btnDibujar" class="btn btn-primary">Graficar</button>
<button id="btnZoomIn" class="btn btn-success">Zoom +</button>
<button id="btnZoomOut" class="btn btn-warning">Zoom -</button>
<button id="btnReset" class="btn btn-secondary">Reset</button>
<button id="btnDark" class="btn btn-dark">Modo oscuro</button>
</div>
</div>

<div class="mt-3">
<button class="btn btn-outline-primary btn-sm preset" data-f="Math.sin(x)">Seno</button>
<button class="btn btn-outline-primary btn-sm preset" data-f="Math.cos(x)">Coseno</button>
<button class="btn btn-outline-primary btn-sm preset" data-f="x*x">x²</button>
<button class="btn btn-outline-primary btn-sm preset" data-f="x*x*x">x³</button>
</div>
</div>

<div class="text-center mt-3">
<canvas id="circlechart" width="640" height="480" class="border bg-white"></canvas>
<p id="coords" class="mt-2 fw-bold">X:0 Y:0</p>
</div>
</div>

<script src="./DistSRC/index.js" type="module"></script>
</body>
</html>
